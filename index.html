<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveTimetable</title>
    <!-- Google Fonts: Inter for minimal look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest & Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080808">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.jpg">
    <!-- pdf.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body>
    <!-- 전체 화면을 드롭 영역으로 사용 -->
    <div id="drop-zone" class="full-screen-drop">
        <!-- 모바일 및 클릭 업로드를 위한 파일 인풋 -->
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
        <!-- 하단 드롭 안내 텍스트 -->
        <div class="drop-indicator" id="drop-zone-text">Drag & Drop PDF Here</div>
        
        <div class="content-wrapper">
            <!-- 왼쪽: 시계와 남은 시간 -->
            <div class="left-content">
                <div id="clock">00:00:00</div>
                <div id="countdown">다음 일정까지 대기 중...</div>
            </div>
            
            <!-- 오른쪽: 미니멀 타임테이블 -->
            <div class="right-content">
                <ul id="timetable-list" class="minimal-timetable">
                    <!-- 일정이 여기에 동적으로 추가됩니다 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Settings Toggle Button -->
    <button id="settings-toggle" class="settings-toggle" title="설정">
        <svg viewBox="0 0 24 24" width="22" height="22">
            <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
        </svg>
    </button>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>설정</h3>
            <button id="settings-close" class="close-btn" title="닫기">&times;</button>
        </div>
        <div class="settings-content">
            <div class="settings-section">
                <h4>테마 & 색상</h4>
                <div class="settings-row">
                    <label for="setting-bgColor">배경 색상</label>
                    <input type="color" id="setting-bgColor">
                </div>
                <div class="settings-row">
                    <label for="setting-textColor">글자 색상</label>
                    <input type="color" id="setting-textColor">
                </div>
                <div class="settings-row">
                    <label for="setting-accentColor">강조 색상 (대기 일정)</label>
                    <input type="color" id="setting-accentColor">
                </div>
                <div class="settings-row">
                    <label for="setting-dangerColor">경고 색상 (진행중 일정)</label>
                    <input type="color" id="setting-dangerColor">
                </div>
            </div>

            <div class="settings-section">
                <h4>시계 설정</h4>
                <div class="settings-row">
                    <label for="setting-clock24h">24시간 형식</label>
                    <label class="switch">
                        <input type="checkbox" id="setting-clock24h">
                        <span class="slider-round"></span>
                    </label>
                </div>
                <div class="settings-row">
                    <label for="setting-showSeconds">초 표시</label>
                    <label class="switch">
                        <input type="checkbox" id="setting-showSeconds">
                        <span class="slider-round"></span>
                    </label>
                </div>
                <div class="settings-row column">
                    <div class="label-val">
                        <label for="setting-clockSize">시계 크기</label>
                        <span id="val-clockSize">7.0vw</span>
                    </div>
                    <input type="range" id="setting-clockSize" min="3" max="15" step="0.5">
                </div>
            </div>

            <div class="settings-section">
                <h4>시간표 설정</h4>
                <div class="settings-row">
                    <label for="setting-showDeleteBtn">삭제 버튼 표시</label>
                    <label class="switch">
                        <input type="checkbox" id="setting-showDeleteBtn">
                        <span class="slider-round"></span>
                    </label>
                </div>
                <div class="settings-row">
                    <label for="setting-autoScroll">자동 스크롤</label>
                    <label class="switch">
                        <input type="checkbox" id="setting-autoScroll">
                        <span class="slider-round"></span>
                    </label>
                </div>
                <div class="settings-row column">
                    <div class="label-val">
                        <label for="setting-timetableSize">글씨 크기 배율</label>
                        <span id="val-timetableSize">1.0x</span>
                    </div>
                    <input type="range" id="setting-timetableSize" min="0.7" max="1.5" step="0.05">
                </div>
            </div>

            <div class="settings-section no-border">
                <h4>데이터 관리</h4>
                <div class="settings-buttons">
                    <button id="btn-reset-settings" class="btn btn-secondary">설정 초기화</button>
                    <button id="btn-reset-timetable" class="btn btn-danger">시간표 초기화</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
